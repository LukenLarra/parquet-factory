name: BDD tests

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  bdd:
    name: BDD tests
    uses: LukenLarra/processing-tools/.github/workflows/bdd.yaml@bdd-framework-integration
    with:
      service: parquet-factory
      use_kafka: true
      use_minio: true
      use_pushgateway: true
      bdd_config: "bdd-configs/parquet-factory-framework.yml"